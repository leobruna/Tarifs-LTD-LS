      :root {
        --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #ec4899;
        --bg-dark: #0f172a; --bg-darker: #020617; --surface: #1e293b;
        --surface-light: #334155; --text: #f1f5f9; --text-muted: #94a3b8;
        --accent: #22d3ee; --success: #10b981; --danger: #ef4444;

      .bg-gradient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%); opacity: 0.05; }

      .header { display: flex; align-items: center; gap: 2rem; padding: 2rem 0; margin-bottom: 3rem; }
      .logo { width: 100px; height: 100px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 3rem; box-shadow: 0 20px 60px rgba(99, 102, 241, 0.4); }
      .header-content h1 { font-size: 2.5rem; font-weight: 900; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
      .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
      .stat-card { background: var(--surface); padding: 2rem; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); }
      .stat-value { font-size: 2.5rem; font-weight: 900; color: var(--accent); }
      .main-layout { display: grid; grid-template-columns: 320px 1fr; gap: 2rem; }
      .sidebar { background: var(--surface); padding: 2rem; border-radius: 24px; position: sticky; top: 2rem; height: fit-content; }
      .chip { padding: 0.5rem 1rem; background: var(--bg-dark); border-radius: 999px; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.1); margin: 0.2rem; color: white; }
      .chip.active { background: var(--primary); }
      .content { background: var(--surface); border-radius: 24px; overflow: hidden; }
      .table-container { overflow-x: auto; max-height: 70vh; }
      table { width: 100%; border-collapse: collapse; }
      th { padding: 1rem; text-align: left; background: var(--bg-dark); color: var(--text-muted); font-size: 0.75rem; }
      td { padding: 1rem; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
      .price { color: var(--accent); font-weight: bold; }
      .company-badge { padding: 0.2rem 0.6rem; background: rgba(99, 102, 241, 0.2); border-radius: 10px; font-size: 0.8rem; }

        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        let count = 0;
        const companies = new Set();

        DATA.filter(item => {
          const matchCat = filterCat === 'all' || item.Categorie === filterCat;
          const matchSearch = item.Articles.toLowerCase().includes(search.toLowerCase()) || 
                              item.Entreprise.toLowerCase().includes(search.toLowerCase());
          return matchCat && matchSearch;
        }).forEach(item => {
          companies.add(item.Entreprise);
          count++;
          body.innerHTML += `
            <tr>
              <td><strong>${item.Articles}</strong></td>
              <td>${item["Prix Achat"]}</td>
              <td class="price">${item["Prix Vente Entreprise"]}</td>
              <td class="price">${item["Prix Vente Clients"]}</td>
              <td><span class="company-badge">${item.Entreprise}</span></td>
            </tr>`;
        });

        document.getElementById('totalArticles').innerText = DATA.length;
        document.getElementById('totalPartners').innerText = companies.size;
      }

          document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          render(chip.dataset.cat);
        });
      });
